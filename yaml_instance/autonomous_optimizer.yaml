version: 0.1.0
vars:
  target_agent_id: "optimized_agent"
  optimization_rounds: 3
graph:
  id: autonomous_optimizer
  description: >
    A meta-agent pipeline that autonomously optimizes another agent's system prompt.
    The Analyzer reviews performance history to find patterns; the Optimizer generates
    an improved prompt; the Validator tests it; and the Deployer saves it.
    Run this pipeline periodically to keep your agents sharp.
  log_level: INFO
  start:
    - Analyzer
  nodes:
    - id: Analyzer
      type: agent
      description: Analyses the target agent's recent performance to identify patterns.
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: |
          You are a performance analysis expert.

          Your job: Analyse the recent run history for agent "${target_agent_id}"
          and extract actionable patterns.

          1. Call get_past_runs("${target_agent_id}", 10) to load recent history.
          2. Call get_best_prompt("${target_agent_id}") to see the current best prompt.
          3. Identify:
             - Recurring weaknesses (critique patterns)
             - Consistent strengths to preserve
             - Score trend (improving/declining/stable)
             - Task types where performance is lowest
          4. Write a structured analysis with:
             - Performance summary
             - Top 3 weakness patterns (each with example)
             - Recommended improvements
          Pass this analysis to the Optimizer.
        params:
          max_tokens: 4096
          temperature: 0.2
        tools:
          - name: get_past_runs
          - name: get_best_prompt
      edges:
        - target: Optimizer
          condition: always

    - id: Optimizer
      type: agent
      description: Generates an improved system prompt based on the analysis.
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: |
          You are a prompt engineering expert.

          You receive a performance analysis for agent "${target_agent_id}".
          Using the analysis:

          1. Call get_best_prompt("${target_agent_id}") to get the current prompt.
          2. Design an improved prompt that:
             - Addresses each identified weakness pattern
             - Preserves existing strengths
             - Adds specific instructions for low-performing task types
             - Uses concrete, actionable language
          3. Call improve_my_prompt("${target_agent_id}", current_prompt, task_examples, critique_patterns)
             to save the new prompt version.
          4. Report the version number and key improvements made.
        params:
          max_tokens: 4096
          temperature: 0.3
        tools:
          - name: get_best_prompt
          - name: improve_my_prompt
          - name: score_my_output
      edges:
        - target: Validator
          condition: always

    - id: Validator
      type: agent
      description: Tests the new prompt on representative tasks to validate improvement.
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: |
          You are a quality assurance validator testing a new prompt version.

          You receive a new prompt version for agent "${target_agent_id}".
          Your job is to verify it actually improves performance:

          1. Get the new prompt version from get_best_prompt("${target_agent_id}").
          2. Mentally simulate 2–3 representative tasks using the new prompt.
          3. Score each simulated output with score_my_output.
          4. Compare these scores to the historical average from get_past_runs.
          5. Produce a validation report:
             - Simulated task results (task, output excerpt, score)
             - Comparison to baseline
             - Recommendation: APPROVE or REVISE
          Pass the validation report to the Deployer.
        params:
          max_tokens: 4096
          temperature: 0.2
        tools:
          - name: get_best_prompt
          - name: get_past_runs
          - name: score_my_output
          - name: compare_outputs
      edges:
        - target: Deployer
          condition: always

    - id: Deployer
      type: agent
      description: Finalizes and documents the optimization results.
      config:
        provider: openai
        name: gpt-4o-mini
        api_key: ${API_KEY}
        role: |
          You are the deployment coordinator for agent "${target_agent_id}".

          You receive the optimization results and validation report.
          Your final steps:

          1. If the Validator recommends APPROVE:
             - Call save_performance("${target_agent_id}",
                 "autonomous_optimization_run", optimization_summary, 9.0,
                 critique="n/a - optimization run",
                 strengths="Prompt successfully evolved")
             - Report the new version number and changes

          2. If the Validator recommends REVISE:
             - Call save_performance with the revision feedback
             - Note that another optimization round is recommended

          3. Produce a final deployment report with:
             - Agent ID and new prompt version
             - Key improvements made
             - Validation scores
             - Next optimization due (suggest after 10 more runs)
        params:
          max_tokens: 2048
          temperature: 0.2
        tools:
          - name: save_performance
          - name: get_best_prompt
      edges:
        - target: __end__
          condition: always
