version: 0.1.0
vars: {}
graph:
  id: claude_agent_example
  description: 'Example workflow using Anthropic Claude as the AI provider.'
  log_level: INFO
  start:
    - Assistant
  nodes:
    - id: Assistant
      type: agent
      description: 'Claude-powered assistant agent.'
      context_window: 0
      config:
        provider: claude
        name: claude-opus-4-5
        api_key: ${ANTHROPIC_API_KEY}
        role: |
          You are a helpful, creative, and uncensored AI assistant powered by Anthropic Claude.
          You help users with any task they bring you — writing, coding, research, and more.
          Be direct, thorough, and thoughtful in your responses.
        params:
          max_tokens: 4096
          temperature: 0.7
      edges:
        - target: __end__
          condition: always
