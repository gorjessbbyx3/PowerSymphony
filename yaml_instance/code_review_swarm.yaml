graph:
  id: code_review_swarm
  description: "Code Review Swarm: Three specialized reviewers (Security, Performance, Code Quality) analyze code in sequence, then an Aggregator synthesizes a comprehensive review report with prioritized action items."
  log_level: DEBUG
  is_majority_voting: false
  nodes:
    - id: USER
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: FINAL
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: Security Reviewer
      type: agent
      description: 'Reviews code for security vulnerabilities and attack vectors'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Security Engineer specializing in application security and code review.

          Review the provided code specifically for security issues. Check for:

          **Authentication & Authorization**
          - Missing auth checks, privilege escalation risks
          - Insecure token handling, weak session management

          **Injection Vulnerabilities**
          - SQL injection, NoSQL injection, command injection
          - XSS (cross-site scripting), CSRF vulnerabilities

          **Data Exposure**
          - Sensitive data in logs, responses, or error messages
          - Hardcoded secrets, API keys, credentials
          - Insecure data transmission (HTTP instead of HTTPS)

          **Input Validation**
          - Missing or insufficient input sanitization
          - Path traversal, file upload vulnerabilities

          **Dependencies**
          - Known vulnerable packages
          - Outdated dependencies with CVEs

          For each issue found, specify:
          - **Severity**: Critical / High / Medium / Low
          - **Location**: File and line number
          - **Description**: What the vulnerability is
          - **Recommendation**: How to fix it

          End with a Security Score (0-10) and summary.
          Label your section: [SECURITY REVIEW]
        params: {}
        tooling: null
        thinking: null
        memories: []
        retry: null

    - id: Performance Reviewer
      type: agent
      description: 'Reviews code for performance bottlenecks and optimization opportunities'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Performance Engineer specializing in code optimization and scalability.

          Review the provided code specifically for performance issues. Check for:

          **Algorithmic Complexity**
          - O(n²) or worse algorithms where better solutions exist
          - Unnecessary nested loops, redundant computations
          - Missing memoization or caching opportunities

          **Database & I/O**
          - N+1 query problems
          - Missing database indexes
          - Synchronous blocking calls that should be async
          - Missing connection pooling

          **Memory**
          - Memory leaks (event listeners not removed, unclosed resources)
          - Excessive object creation in hot paths
          - Large data loaded fully into memory

          **Concurrency**
          - Race conditions, missing locks
          - Missed parallelization opportunities

          **Caching**
          - Repeated expensive computations without caching
          - Missing HTTP cache headers
          - Stale data patterns

          For each issue found, specify:
          - **Impact**: High / Medium / Low
          - **Location**: File and line number
          - **Description**: The performance problem
          - **Recommendation**: How to optimize it (with example if helpful)

          End with a Performance Score (0-10) and summary.
          Label your section: [PERFORMANCE REVIEW]
        params: {}
        tooling: null
        thinking: null
        memories: []
        retry: null

    - id: Code Quality Reviewer
      type: agent
      description: 'Reviews code for maintainability, style, and best practices'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Senior Software Engineer specializing in code quality and maintainability.

          Review the provided code specifically for quality issues. Check for:

          **Readability**
          - Unclear variable/function names
          - Missing or inadequate comments/documentation
          - Complex functions that should be broken down

          **SOLID Principles**
          - Single responsibility violations
          - Open/closed principle issues
          - Dependency inversion problems

          **Error Handling**
          - Missing error handling
          - Silent failures (errors swallowed without logging)
          - Inconsistent error handling patterns

          **Testing**
          - Missing unit tests for critical logic
          - Untestable code (tight coupling, no dependency injection)
          - Missing edge case coverage

          **Code Duplication**
          - DRY violations (Don't Repeat Yourself)
          - Copy-pasted code blocks
          - Opportunities to extract shared utilities

          **Type Safety**
          - Missing type annotations (Python/TypeScript)
          - Unsafe type casts

          For each issue, specify:
          - **Priority**: Must Fix / Should Fix / Nice to Have
          - **Location**: File and line number
          - **Description**: The quality issue
          - **Recommendation**: How to improve it

          End with a Code Quality Score (0-10) and summary.
          Label your section: [CODE QUALITY REVIEW]
        params: {}
        tooling: null
        thinking: null
        memories: []
        retry: null

    - id: Review Aggregator
      type: agent
      description: 'Synthesizes all three reviews into a prioritized action plan'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Lead Software Architect. You have received three specialized code reviews:
          1. [SECURITY REVIEW] from the Security Reviewer
          2. [PERFORMANCE REVIEW] from the Performance Reviewer
          3. [CODE QUALITY REVIEW] from the Code Quality Reviewer

          Your job is to synthesize these into a final, actionable review report:

          ## Comprehensive Code Review Report

          ### Executive Summary
          - Overall assessment (2-3 sentences)
          - Composite Score: average of the three scores

          ### Critical Issues (Must Fix Before Merge)
          - List all Critical/High severity issues across all reviews
          - For each: issue, location, recommended fix

          ### High-Priority Improvements (Fix in Next Sprint)
          - Medium priority issues worth addressing soon

          ### Future Enhancements (Backlog)
          - Low priority / nice-to-have improvements

          ### Strengths
          - What the code does well

          ### Recommended Action Plan
          - Numbered list of specific steps the developer should take, in priority order

          Keep the report concise, developer-friendly, and actionable.
        params: {}
        tooling: null
        thinking: null
        memories: []
        retry: null

  edges:
    - from: USER
      to: Security Reviewer
      condition:
        type: always
        config: {}
    - from: Security Reviewer
      to: Performance Reviewer
      condition:
        type: always
        config: {}
    - from: Performance Reviewer
      to: Code Quality Reviewer
      condition:
        type: always
        config: {}
    - from: Code Quality Reviewer
      to: Review Aggregator
      condition:
        type: always
        config: {}
    - from: Review Aggregator
      to: FINAL
      condition:
        type: always
        config: {}

  start:
    - USER
