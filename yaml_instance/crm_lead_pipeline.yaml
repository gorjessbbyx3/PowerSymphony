version: 0.1.0
vars: {}
graph:
  id: crm_lead_pipeline
  description: >
    An AI-driven lead management pipeline. The Lead Researcher agent
    gathers information about a lead from the web; the CRM Manager agent
    then creates or updates the HubSpot contact and deal record with the
    enriched information.
  log_level: INFO
  start:
    - Lead Researcher
  nodes:
    - id: Lead Researcher
      type: agent
      description: Researches a lead using web search and scraping.
      config:
        provider: openai
        name: gpt-4o-mini
        api_key: ${API_KEY}
        role: |
          You are a B2B sales development representative.
          Given a lead (name, company, or email in the task prompt),
          research them thoroughly:
          - Search for their LinkedIn, company website, and recent news
          - Scrape relevant pages to gather contact details, company info, and pain points
          - Summarise findings: full name, email (if found), company, role,
            company size, recent activity, and a personalised outreach angle
        params:
          max_tokens: 4096
          temperature: 0.2
        tools:
          - name: web_search
          - name: scrape_url
          - name: extract_structured_data
      edges:
        - target: CRM Manager
          condition: always

    - id: CRM Manager
      type: agent
      description: Creates or updates HubSpot contacts and deals based on research.
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: |
          You are a CRM operations specialist with access to HubSpot.
          Using the lead research provided:
          1. Search HubSpot for an existing contact with the same email/name
          2. Create a new contact if none exists, or update the existing one
          3. Create a new deal linked to the contact with stage 'appointmentscheduled'
          4. Log a NOTE activity summarising the research and recommended next step
          Always confirm what you created/updated and provide the HubSpot IDs.
        params:
          max_tokens: 4096
          temperature: 0.0
        tools:
          - name: crm_search_contacts
          - name: crm_create_contact
          - name: crm_update_contact
          - name: crm_create_deal
          - name: crm_log_activity
      edges:
        - target: __end__
          condition: always
