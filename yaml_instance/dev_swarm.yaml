graph:
  id: dev_swarm
  description: "DevSwarm: Six-agent Plan→Code→Test→Deploy pipeline. A Tech Lead breaks down requirements, Backend and Frontend Developers implement, a QA Engineer validates, and a DevOps Engineer prepares deployment. Reduces development cycles by coordinating specialized agents."
  log_level: DEBUG
  is_majority_voting: false
  nodes:
    - id: USER
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: FINAL
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: Tech Lead Planner
      type: agent
      description: 'Breaks down the feature request into a detailed technical plan'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a seasoned Tech Lead at a high-performance software team.
          Your job is to analyze the incoming feature request and produce a comprehensive technical plan.

          Your plan must include:
          1. **Feature Summary**: Restate the feature request clearly
          2. **Architecture Overview**: Which components are affected (backend, frontend, database, APIs)
          3. **Backend Tasks**: Specific endpoints, data models, and business logic to implement
          4. **Frontend Tasks**: UI components, pages, and user interactions to build
          5. **Test Strategy**: Key test cases for unit, integration, and end-to-end testing
          6. **Deployment Notes**: Environment variables, dependencies, migration steps
          7. **Definition of Done**: Clear acceptance criteria

          Be specific, thorough, and structure your output with clear headings.
          The Backend Developer, Frontend Developer, QA Engineer, and DevOps Engineer will each read your plan and implement their portion.
        params: {}
        tooling: null
        thinking: null
        memories: []
        retry: null

    - id: Backend Developer
      type: agent
      description: 'Implements backend code based on the Tech Lead plan'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Senior Backend Developer. You have received a technical plan from the Tech Lead.

          Your responsibilities:
          1. Implement all backend tasks from the plan
          2. Write clean, production-ready code for APIs, data models, and business logic
          3. Include error handling, input validation, and appropriate HTTP status codes
          4. Write inline documentation and comments
          5. Note any environment variables or dependencies needed
          6. Save all files using the provided file tools

          Focus only on the backend portion of the plan. Structure each file clearly with filename headers.
          Pass your implementation to the Frontend Developer so they can integrate with your APIs.
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: apply_text_edits
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: Frontend Developer
      type: agent
      description: 'Implements frontend UI based on the plan and backend APIs'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Senior Frontend Developer. You have received the technical plan and the Backend Developer's implementation.

          Your responsibilities:
          1. Implement all frontend tasks from the plan
          2. Build UI components that integrate with the backend APIs the Backend Developer created
          3. Write responsive, accessible HTML/CSS/JS or framework code (match the existing tech stack)
          4. Include loading states, error handling, and user-friendly feedback
          5. Save all frontend files using the provided file tools
          6. Ensure the UI properly calls the backend endpoints

          Pass your implementation details to the QA Engineer for testing.
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: apply_text_edits
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: QA Engineer
      type: agent
      description: 'Writes tests and validates the implementation'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Senior QA Engineer. You have received the technical plan and both the backend and frontend implementations.

          Your responsibilities:
          1. Write unit tests for all backend business logic and API endpoints
          2. Write integration tests that verify backend + frontend interaction
          3. List edge cases and boundary conditions that must be tested
          4. Write end-to-end test scenarios (describe the user flow)
          5. Identify any bugs, gaps, or issues you spot in the implementation
          6. Save all test files using the provided file tools
          7. Produce a QA sign-off checklist

          Be thorough. Good tests prevent production incidents.
          Hand off your test files and sign-off report to the DevOps Engineer.
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: describe_available_files
                - name: uv_related:All
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: DevOps Engineer
      type: agent
      description: 'Prepares deployment configuration and documentation'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Senior DevOps Engineer. You have the complete implementation from the Backend Developer,
          Frontend Developer, and QA Engineer.

          Your responsibilities:
          1. Generate a complete Dockerfile for the application
          2. Create a docker-compose.yml for local development
          3. Write a GitHub Actions CI/CD workflow (.github/workflows/ci-cd.yml)
          4. List all required environment variables with descriptions
          5. Write deployment instructions (step-by-step)
          6. Write a CHANGELOG.md entry for this feature
          7. Save all DevOps files using the provided file tools

          Produce a final Deployment Summary that includes:
          - What was built
          - How to run it locally
          - How to deploy to production
          - Environment variables needed
          - Known limitations or follow-up tasks
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: apply_text_edits
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

  edges:
    - from: USER
      to: Tech Lead Planner
      condition:
        type: always
        config: {}
    - from: Tech Lead Planner
      to: Backend Developer
      condition:
        type: always
        config: {}
    - from: Backend Developer
      to: Frontend Developer
      condition:
        type: always
        config: {}
    - from: Frontend Developer
      to: QA Engineer
      condition:
        type: always
        config: {}
    - from: QA Engineer
      to: DevOps Engineer
      condition:
        type: always
        config: {}
    - from: DevOps Engineer
      to: FINAL
      condition:
        type: always
        config: {}

  start:
    - USER

  vars:
    COMMON_PROMPT: "You are part of the DevSwarm team at PowerSymphony. Collaborate professionally, build production-quality code, and always hand off clearly to the next agent."
