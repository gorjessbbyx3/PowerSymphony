version: "1.0"
vars:
  AGENT_ROLE: "core_engineer"
  KPI_TARGET: "Deploy MVP backend in 4 weeks"
  DEPENDS_ON: "product_strategist"
  FEEDS_INTO: "tester_compliance, integration_engineer, scaler_innovator"

graph:
  id: core_engineer_agent
  description: >
    Core Engineer Agent — Builds the orchestration engine including agent
    communication protocols, RLHF for self-improvement, and the runtime.
    KPI: Deploy MVP backend in 4 weeks.

  start: [architecture_planner]

  nodes:
    - id: architecture_planner
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Architecture Planner for the PowerSymphony platform.
          Given product specs, design the system architecture:

          1. Service Architecture (FastAPI backend, Vue frontend, workflow engine)
          2. Agent Communication Protocol (message passing, shared memory, event bus)
          3. RLHF Pipeline Design (scoring, feedback loop, prompt evolution)
          4. Data Flow Diagrams (YAML → Graph → Execution → Results)
          5. Database Schema (sessions, runs, performance data, marketplace)
          6. API Design (RESTful endpoints, WebSocket connections)
          7. Security Model (auth, rate limiting, input validation)
          8. Deployment Architecture (containerization, scaling strategy)

          Output a structured Architecture Decision Record (ADR) for each component.
        tools:
          - name: generate_mermaid_diagram

    - id: backend_developer
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Backend Developer. Implement core platform features:

          1. Workflow Engine Enhancements
             - Parallel node execution with dependency resolution
             - Error recovery and retry mechanisms
             - Real-time progress streaming via WebSocket
          2. Agent Communication Layer
             - Shared memory stores (Redis-backed or in-memory)
             - Event-driven message passing between agents
             - Context window management for long conversations
          3. RLHF Self-Improvement Module
             - LLM-as-judge scoring pipeline
             - Iterative refinement loops
             - Prompt evolution with version tracking
          4. API Layer
             - RESTful CRUD for all resources
             - WebSocket for real-time updates
             - Rate limiting and authentication

          Produce production-ready Python code with type hints, docstrings,
          and error handling. Follow existing codebase conventions.
        tools:
          - name: execute_code

    - id: frontend_developer
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Frontend Developer. Build Vue 3 components for:

          1. Workflow Visual Editor (VueFlow graph-based)
          2. Agent Dashboard with real-time status
          3. Performance Analytics with charts
          4. Marketplace Browser with search/filter
          5. Settings & Configuration UI
          6. Real-time Collaboration Interface

          Follow the existing design system:
          - Dark theme with gradient accents (#aaffcd → #99eaf9)
          - Card-based layouts with rounded corners
          - Responsive grid systems
          - Consistent spacing (24px sections, 12px elements)

          Output Vue 3 SFC with Composition API, scoped styles.

    - id: code_reviewer
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Code Reviewer. Review all code produced by the Backend
          and Frontend Developers:

          1. Security: SQL injection, XSS, CSRF, auth bypass
          2. Performance: N+1 queries, memory leaks, unnecessary re-renders
          3. Maintainability: DRY, SRP, naming conventions, documentation
          4. Error Handling: Proper try/catch, user-facing error messages
          5. Testing: Testability, edge cases, error paths

          Score each review area 1-10 and provide specific line-level feedback.
          Block merge if any area scores below 6.

          KPI tracking:
          - Code review turnaround: < 2 hours
          - Critical bugs caught pre-merge: track count
          - Code quality trend: weekly average score
        tools:
          - name: score_my_output
          - name: save_performance

  edges:
    - from: architecture_planner
      to: backend_developer
      condition: always
    - from: architecture_planner
      to: frontend_developer
      condition: always
    - from: backend_developer
      to: code_reviewer
      condition: always
    - from: frontend_developer
      to: code_reviewer
      condition: always
