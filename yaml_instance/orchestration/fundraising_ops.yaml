version: "1.0"
vars:
  AGENT_ROLE: "fundraising_ops"
  KPI_TARGET: "Secure $1M simulated angel funding in Month 3; CAC:LTV > 1:3"
  DEPENDS_ON: "market_researcher, sales_marketing"
  FEEDS_INTO: "scaler_innovator, product_strategist"

graph:
  id: fundraising_ops_agent
  description: >
    Fundraising & Ops Agent — Models financials, generates pitch decks,
    monitors operational metrics (CAC:LTV ratio >1:3), and prepares for
    angel funding. KPI: Secure simulated $1M in Month 3.

  start: [financial_modeler]

  nodes:
    - id: financial_modeler
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Financial Modeler. Build comprehensive financial models:

          1. Revenue Model
             - Pricing tiers: Free (5 workflows), Pro ($49/mo), Enterprise ($199/mo)
             - Projected conversion rates: Free→Pro (5%), Pro→Enterprise (15%)
             - Monthly recurring revenue projections (12-month horizon)
             - Annual contract value (ACV) targets

          2. Cost Structure
             - Infrastructure: Cloud hosting, LLM API costs
             - Personnel: Engineering, sales, marketing
             - Tools & SaaS: Development tools, analytics
             - Customer acquisition cost (CAC) breakdown

          3. Unit Economics
             - CAC by channel (LinkedIn, email, referral, organic)
             - LTV calculation (churn rate, expansion revenue)
             - CAC:LTV ratio tracking (target >1:3)
             - Payback period per customer segment

          4. Cash Flow Projections
             - Monthly burn rate
             - Runway calculation
             - Break-even analysis

          Output: Financial model as structured JSON with monthly projections.

    - id: pitch_deck_generator
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Pitch Deck Generator. Create an investor-ready pitch deck:

          Slide 1: Cover — PowerSymphony: AI Workflow Orchestration
          Slide 2: Problem — $X billion wasted on manual workflows
          Slide 3: Solution — Visual AI agent orchestration platform
          Slide 4: Market Size — TAM $XB, SAM $XB, SOM $XM
          Slide 5: Product Demo — Key screenshots and workflow examples
          Slide 6: Traction — Beta users, usage metrics, testimonials
          Slide 7: Business Model — SaaS pricing tiers, unit economics
          Slide 8: Competitive Landscape — Differentiation matrix
          Slide 9: Team — Agent capabilities and self-improving architecture
          Slide 10: Financials — Revenue projections, burn rate, runway
          Slide 11: The Ask — $1M angel round, use of funds
          Slide 12: Vision — Platform for autonomous AI collaboration

          For each slide, provide:
          {slide_number, title, key_message, supporting_data, visual_suggestion,
           speaker_notes}

    - id: metrics_monitor
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Operations Metrics Monitor. Track and report on:

          1. Business Health KPIs
             - MRR (Monthly Recurring Revenue)
             - ARR (Annual Recurring Revenue)
             - Net Revenue Retention (NRR)
             - Gross margin percentage

          2. Growth Metrics
             - Week-over-week user growth
             - Activation rate (signup → first workflow)
             - Feature adoption rates
             - Net Promoter Score (NPS)

          3. Operational Efficiency
             - CAC:LTV ratio (target >1:3)
             - Burn multiple (net burn / net new ARR)
             - Magic number (net new ARR / sales & marketing spend)
             - Rule of 40 (revenue growth % + profit margin %)

          4. Fundraising Readiness
             - Investor pipeline: identified → contacted → meeting → term sheet
             - Due diligence checklist completion
             - Data room preparation status

          Output: Weekly ops dashboard JSON with trend indicators.
        tools:
          - name: score_my_output
          - name: save_performance
          - name: get_stock_price
          - name: get_news_headlines

  edges:
    - from: financial_modeler
      to: pitch_deck_generator
      condition: always
    - from: financial_modeler
      to: metrics_monitor
      condition: always
    - from: pitch_deck_generator
      to: metrics_monitor
      condition: always
