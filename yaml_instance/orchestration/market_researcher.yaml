version: "1.0"
vars:
  AGENT_ROLE: "market_researcher"
  KPI_TARGET: "50 validated pain points per week"
  DEPENDS_ON: "none"
  FEEDS_INTO: "product_strategist, sales_marketing, fundraising_ops"

graph:
  id: market_researcher_agent
  description: >
    Market Researcher Agent — Analyzes sales data, identifies target industries
    (SaaS firms with 50-500 employees), validates pain points, and produces
    structured competitive intelligence. KPI: 50 validated pain points/week.

  start: [industry_scanner]

  nodes:
    - id: industry_scanner
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Industry Scanner sub-agent of the Market Researcher.
          Your job is to identify and profile target industries for an AI workflow
          orchestration platform. Focus on:
          - SaaS companies with 50-500 employees
          - Companies spending >$50K/year on developer tools
          - Industries with complex multi-step workflows (fintech, healthtech, legaltech)
          - Companies currently using manual or semi-automated processes

          Output a structured JSON array of industry profiles with:
          {industry, segment_size, avg_company_size, automation_readiness_score,
           key_players[], estimated_TAM}
        tools:
          - name: web_search
          - name: get_news_headlines

    - id: pain_point_validator
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Pain Point Validator. Given industry profiles from the
          Industry Scanner, you must:
          1. Identify specific operational pain points for each industry
          2. Validate each pain point with evidence (market data, forum posts, case studies)
          3. Score each pain point: severity (1-10), frequency (1-10), willingness_to_pay (1-10)
          4. Filter to only pain points scoring >= 7 on average across dimensions

          Output a JSON array of validated pain points:
          {pain_point, industry, severity, frequency, willingness_to_pay,
           evidence_summary, potential_solution, estimated_value_per_customer}

          Target: Produce at least 50 validated pain points per analysis cycle.
        tools:
          - name: web_search

    - id: competitor_analyst
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Competitive Intelligence Analyst. Analyze the competitive
          landscape for AI workflow orchestration:
          1. Map direct competitors (LangChain, CrewAI, AutoGen, etc.)
          2. Identify their pricing, features, and market positioning
          3. Find gaps and unmet needs in current solutions
          4. Assess threat level and differentiation opportunities

          Output a structured competitive matrix:
          {competitor, pricing_tier, key_features[], market_share_estimate,
           weaknesses[], our_differentiation}
        tools:
          - name: web_search
          - name: get_news_headlines

    - id: research_synthesizer
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Research Synthesizer. Combine outputs from the Industry Scanner,
          Pain Point Validator, and Competitive Analyst into a single actionable
          Market Intelligence Report. Structure:

          ## Executive Summary
          ## Target Industries (ranked by opportunity)
          ## Validated Pain Points (top 50, scored)
          ## Competitive Landscape Matrix
          ## Recommended Go-to-Market Priorities
          ## Data Feeds for Product Strategist Agent
          ## Data Feeds for Sales & Marketing Agent
          ## Data Feeds for Fundraising & Ops Agent

          KPI Tracking:
          - Pain points validated this cycle: [count] / 50 target
          - New industries profiled: [count]
          - Competitive intel updates: [count]
        tools:
          - name: score_my_output
          - name: save_performance

  edges:
    - from: industry_scanner
      to: pain_point_validator
      condition: always
    - from: industry_scanner
      to: competitor_analyst
      condition: always
    - from: pain_point_validator
      to: research_synthesizer
      condition: always
    - from: competitor_analyst
      to: research_synthesizer
      condition: always
