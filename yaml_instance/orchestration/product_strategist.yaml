version: "1.0"
vars:
  AGENT_ROLE: "product_strategist"
  KPI_TARGET: "Quarterly roadmap with user-feedback-driven updates"
  DEPENDS_ON: "market_researcher"
  FEEDS_INTO: "core_engineer, integration_engineer, tester_compliance"

graph:
  id: product_strategist_agent
  description: >
    Product Strategist Agent — Defines features (lead scoring via NLP, workflow
    builder, etc.), prioritizes backlog, and maintains a quarterly roadmap updated
    by user feedback loops. KPI: Roadmap with quarterly updates.

  start: [feedback_collector]

  nodes:
    - id: feedback_collector
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Feedback Collector. Your job is to aggregate and analyze
          user feedback from multiple channels:
          1. Parse market researcher pain points into feature requests
          2. Categorize feedback: bug, feature_request, improvement, integration
          3. Score each item by user_demand (1-10), alignment_with_vision (1-10),
             implementation_effort (1=easy, 10=hard)
          4. Identify recurring themes and top-requested capabilities

          Output JSON:
          {feedback_items: [{id, category, description, user_demand, vision_alignment,
           effort, theme, source}], themes: [{name, count, avg_demand}]}

    - id: feature_prioritizer
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Feature Prioritizer using a RICE scoring framework:
          - Reach: How many users will benefit (1-10)
          - Impact: Magnitude of benefit (1-3 scale: minimal, notable, massive)
          - Confidence: How sure we are about estimates (percentage)
          - Effort: Person-weeks to implement

          Given feedback items and market research:
          1. Score each feature using RICE
          2. Rank features by RICE score descending
          3. Group into: Must-Have (Q1), Should-Have (Q2), Nice-to-Have (Q3+)
          4. Flag dependencies between features

          Output a prioritized feature backlog with RICE scores and quarter assignments.

    - id: roadmap_architect
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Roadmap Architect. Build a quarterly product roadmap from
          the prioritized backlog:

          ## Q1: Foundation (MVP)
          - Core orchestration engine, basic UI, 3 integrations
          ## Q2: Growth
          - Advanced features, marketplace, 5+ integrations
          ## Q3: Scale
          - Enterprise features, analytics, custom templates
          ## Q4: Innovation
          - AI self-improvement, voice interfaces, advanced automation

          For each feature include:
          {feature, quarter, priority, dependencies[], assigned_to_agent,
           success_metrics, user_story, acceptance_criteria[]}

          Cross-reference with:
          - Core Engineer: backend implementation capacity
          - Integration Engineer: API hook availability
          - Tester: testing requirements per feature
        tools:
          - name: score_my_output
          - name: save_performance

    - id: spec_writer
      type: agent
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: >
          You are the Spec Writer. For each feature in the current quarter's
          roadmap, produce a detailed Product Requirements Document (PRD):

          1. Feature Overview & User Story
          2. Functional Requirements (numbered FR-001, FR-002…)
          3. Non-Functional Requirements (performance, security, scalability)
          4. API Contract (endpoints, request/response schemas)
          5. UI/UX Wireframe Description
          6. Data Model Changes
          7. Testing Strategy (unit, integration, e2e)
          8. Dependencies on Other Agents
          9. Success Metrics & KPIs

          Output specs that the Core Engineer and Integration Engineer can
          directly implement from.
        tools:
          - name: score_my_output

  edges:
    - from: feedback_collector
      to: feature_prioritizer
      condition: always
    - from: feature_prioritizer
      to: roadmap_architect
      condition: always
    - from: roadmap_architect
      to: spec_writer
      condition: always
