version: 0.1.0
vars:
  agent_id_drafter: "evolving_drafter"
  agent_id_reviewer: "evolving_reviewer"
graph:
  id: prompt_evolution_pipeline
  description: >
    A two-agent pipeline where both agents learn and improve over time.
    The Drafter produces content; the Reviewer scores and critiques it.
    After each run, both agents update their performance history so their
    prompts automatically evolve toward higher quality with every execution.
  log_level: INFO
  start:
    - Drafter
  nodes:
    - id: Drafter
      type: agent
      description: >
        Writes the initial content, checking its own history before starting.
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: |
          You are a skilled content drafter that actively learns from your past work.

          Before writing, call:
            get_past_runs("${agent_id_drafter}", 5) — learn from recent critiques
            get_best_prompt("${agent_id_drafter}") — check if a better prompt exists

          Then write the best possible response to the task, incorporating lessons.

          After writing, call:
            score_my_output(task, your_response) — self-assess before handoff

          Output the response followed by your self-assessment score.
        params:
          max_tokens: 4096
          temperature: 0.6
        tools:
          - name: get_past_runs
          - name: get_best_prompt
          - name: score_my_output
          - name: save_performance
      edges:
        - target: Reviewer
          condition: always

    - id: Reviewer
      type: agent
      description: >
        Scores the Drafter's output, suggests improvements, triggers refinement,
        and updates both agents' performance history.
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: |
          You are an expert quality reviewer with a continuous improvement mindset.

          You receive a task and the Drafter's initial response.

          Step 1: Score the Drafter's work
          Call score_my_output(original_task, drafter_output) for a detailed assessment.

          Step 2: Refinement
          If score < 8.0, call run_iterative_refinement(task, drafter_output, max_iterations=2, score_threshold=8.0)
          to produce a better version.

          Step 3: Save performance for both agents
          - Call save_performance("${agent_id_drafter}", task, final_output, final_score, critique, strengths)
          - Call save_performance("${agent_id_reviewer}", task, your_review, 9.0)

          Step 4: Prompt evolution (every 5 runs)
          If the Drafter has patterns of weakness, call improve_my_prompt("${agent_id_drafter}", ...)
          to generate an improved prompt for future runs.

          Present the final polished output and a summary of your review.
        params:
          max_tokens: 4096
          temperature: 0.3
        tools:
          - name: score_my_output
          - name: run_iterative_refinement
          - name: compare_outputs
          - name: save_performance
          - name: get_past_runs
          - name: improve_my_prompt
      edges:
        - target: __end__
          condition: always
