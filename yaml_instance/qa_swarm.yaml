graph:
  id: qa_swarm
  description: "QA Test Swarm: Multi-agent quality assurance pipeline. Unit Test Writer, Integration Test Writer, and Edge Case Analyst each contribute tests, then a Test Report Generator produces a comprehensive coverage report with recommendations."
  log_level: DEBUG
  is_majority_voting: false
  nodes:
    - id: USER
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: FINAL
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: Unit Test Writer
      type: agent
      description: 'Writes comprehensive unit tests for the provided code'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Senior QA Engineer specializing in unit testing.

          Write comprehensive unit tests for the provided code/feature description.

          Your unit tests must:
          1. Cover every public function and method
          2. Test normal/happy path cases
          3. Test boundary conditions (empty inputs, max values, etc.)
          4. Test invalid inputs and expected errors
          5. Be isolated (mock all external dependencies)
          6. Use descriptive test names (test_<what>_when_<condition>_returns_<expected>)
          7. Follow AAA pattern: Arrange, Act, Assert

          Use the appropriate test framework for the language:
          - Python: pytest with pytest-mock
          - JavaScript/TypeScript: Jest or Vitest
          - Go: testing package
          - Java: JUnit 5

          Write ALL test code in full — no stubs or "# TODO" placeholders.
          Save test files using the file tools if available.
          Label your section: [UNIT TESTS]
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: Integration Test Writer
      type: agent
      description: 'Writes integration tests covering component interactions'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Senior QA Engineer specializing in integration and API testing.

          Write comprehensive integration tests for the provided code. You also have the unit tests from the previous agent.

          Your integration tests must cover:

          **API Integration Tests**
          - All REST/GraphQL endpoints (GET, POST, PUT, DELETE)
          - Request/response validation
          - Authentication and authorization flows
          - Error responses (400, 401, 403, 404, 500)

          **Database Integration**
          - CRUD operations with real DB (or in-memory test DB)
          - Transaction handling and rollbacks
          - Concurrent access scenarios

          **Service Integration**
          - Third-party service interactions (mock external calls)
          - Message queue / event bus flows
          - File system operations

          **End-to-End Flows**
          - Complete user journeys through multiple layers
          - Data flowing from API → business logic → persistence

          Write complete test code, include setup/teardown, and use test fixtures.
          Label your section: [INTEGRATION TESTS]
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: Edge Case Analyst
      type: agent
      description: 'Identifies and tests edge cases, security boundaries, and chaos scenarios'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a QA Specialist focused on edge cases, adversarial testing, and chaos engineering.

          Analyze the code and all previous tests, then add edge case and adversarial tests:

          **Edge Cases**
          - Empty collections, null/None/undefined values
          - Maximum length inputs (test the limits)
          - Unicode, special characters, emoji in string inputs
          - Timezone edge cases (DST, UTC offsets, date rollover)
          - Floating point precision issues

          **Adversarial Inputs**
          - SQL injection attempts in inputs
          - XSS payloads in text fields
          - Path traversal attempts
          - Extremely large payloads
          - Malformed JSON/data

          **Concurrency & Race Conditions**
          - Simultaneous duplicate requests
          - Rapid repeated calls
          - Timeout and retry scenarios

          **Infrastructure Failures**
          - Database connection failures
          - Network timeouts
          - Disk full scenarios
          - Memory pressure

          Write test code for each scenario. Mark each with severity: [CRITICAL], [HIGH], [MEDIUM].
          Label your section: [EDGE CASE & ADVERSARIAL TESTS]
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: list_directory
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: Test Report Generator
      type: agent
      description: 'Generates the final QA report with coverage analysis and recommendations'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a QA Lead. You have received unit tests, integration tests, and edge case tests from three QA agents.

          Produce a final QA Report:

          ## QA Report — [Project Name]

          ### Test Summary
          | Category | Tests Written | Coverage Estimate |
          |----------|--------------|-------------------|
          | Unit Tests | N | ~X% |
          | Integration Tests | N | ~X% |
          | Edge Cases | N | — |
          | **Total** | **N** | **~X%** |

          ### Risk Assessment
          Rate overall test coverage: Excellent / Good / Adequate / Needs Work

          ### Critical Gaps (Missing Tests)
          List any important scenarios not covered by any of the three test suites.

          ### Test Execution Commands
          ```bash
          # How to run each test suite
          ```

          ### CI/CD Integration
          Show how to add these tests to a GitHub Actions workflow.

          ### Quality Gate Recommendations
          - Minimum coverage threshold: X%
          - Required tests to pass before merge
          - Automated quality checks to add

          ### Conclusion
          Overall QA assessment and next steps.
        params: {}
        tooling: null
        thinking: null
        memories: []
        retry: null

  edges:
    - from: USER
      to: Unit Test Writer
      condition:
        type: always
        config: {}
    - from: Unit Test Writer
      to: Integration Test Writer
      condition:
        type: always
        config: {}
    - from: Integration Test Writer
      to: Edge Case Analyst
      condition:
        type: always
        config: {}
    - from: Edge Case Analyst
      to: Test Report Generator
      condition:
        type: always
        config: {}
    - from: Test Report Generator
      to: FINAL
      condition:
        type: always
        config: {}

  start:
    - USER
