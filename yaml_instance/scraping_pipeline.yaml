version: 0.1.0
vars: {}
graph:
  id: scraping_pipeline
  description: >
    A two-agent pipeline that scrapes a list of URLs and produces
    a structured research report. The Scraper agent collects raw text
    from each page; the Analyst agent synthesises the content into
    a coherent summary with key takeaways.
  log_level: INFO
  start:
    - Scraper
  nodes:
    - id: Scraper
      type: agent
      description: Scrapes web pages and returns raw content.
      config:
        provider: openai
        name: gpt-4o-mini
        api_key: ${API_KEY}
        role: |
          You are a professional web-scraping assistant.
          Given a list of URLs in the task, use the available tools to scrape
          each URL and collect its main text. Compile the raw content and pass it
          along verbatim.
        params:
          max_tokens: 4096
          temperature: 0.0
        tools:
          - name: scrape_url
          - name: batch_scrape
          - name: scrape_links
      edges:
        - target: Analyst
          condition: always

    - id: Analyst
      type: agent
      description: Synthesises scraped content into a structured report.
      config:
        provider: openai
        name: gpt-4o
        api_key: ${API_KEY}
        role: |
          You are a research analyst. You receive raw scraped text from multiple
          web pages and produce a concise, well-structured Markdown report with:
          1. An executive summary
          2. Key themes and findings (bullet points)
          3. Notable facts or statistics
          4. Recommended next actions
        params:
          max_tokens: 8192
          temperature: 0.3
      edges:
        - target: __end__
          condition: always
