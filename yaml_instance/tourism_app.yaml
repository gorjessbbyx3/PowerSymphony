graph:
  id: tourism_app
  description: "Tourism App Builder: Domain-specific workflow for geo-aware travel applications. Specializes in Hawaii and Pacific tourism but works globally. Pulls live geo, weather, and location data to generate complete tourism apps with itineraries, attraction discovery, and booking features."
  log_level: DEBUG
  is_majority_voting: false
  nodes:
    - id: USER
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: FINAL
      type: passthrough
      description: ''
      context_window: 0
      config: {}

    - id: Travel Product Manager
      type: agent
      description: 'Defines the tourism app features and target audience'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Travel Product Manager with deep expertise in geo-location tourism applications and the Pacific tourism market.

          Analyze the user's tourism app request and produce a comprehensive product specification:

          ## Tourism App Product Specification

          ### App Concept
          - Target destination(s) and traveler segments
          - Core value proposition
          - Monetization model (freemium, subscription, booking commission)

          ### Feature Set
          **Discovery Features**:
          - Attraction and POI discovery with categories
          - Real-time weather display per location
          - User reviews and ratings
          - Photo galleries

          **Planning Features**:
          - AI-powered itinerary generator
          - Day-by-day schedule builder
          - Budget estimator

          **Navigation Features**:
          - Map integration (Google Maps / Mapbox)
          - Walking/driving directions
          - Nearby search

          **Booking Features** (if applicable):
          - Hotel search and booking
          - Tour/activity booking
          - Restaurant reservations

          ### Data Sources & APIs
          List specific APIs needed:
          - Weather: OpenWeatherMap
          - Maps: Google Maps Places API or Mapbox
          - Location data: OpenStreetMap / Nominatim
          - Reviews: Google Places, TripAdvisor
          - Booking: Booking.com, Viator, or OpenTable APIs

          ### App Architecture
          - Frontend framework recommendation (React Native, Flutter, Next.js)
          - Backend API structure
          - Data caching strategy for offline use

          ### Hawaii/Pacific-Specific Considerations (if applicable)
          - Island-specific attractions by island (Oahu, Maui, Big Island, Kauai)
          - Seasonal weather patterns
          - Cultural sensitivities (Hawaiian culture, respect for nature)
          - Popular areas: Waikiki, North Shore, Haleakala, Na Pali Coast
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: geocode_location
                - name: get_weather
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: Location Data Integrator
      type: agent
      description: 'Builds geo-API integration layer with live location and weather data'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Geo-API Integration Engineer. You have the product specification from the Travel Product Manager.

          Build the complete location data integration layer:

          **1. Location Service** (backend Python/Node.js):
          ```python
          # Location service with these endpoints:
          # GET /api/locations/search?q=<query>&lat=<lat>&lon=<lon>
          # GET /api/locations/<id>
          # GET /api/locations/nearby?lat=<lat>&lon=<lon>&radius=<km>&category=<cat>
          # GET /api/weather/<city>
          # GET /api/weather/forecast/<city>
          ```

          **2. Data Models**:
          - Location (id, name, category, lat, lon, description, images, rating)
          - Itinerary (id, title, days, locations, estimated_duration, budget_range)
          - WeatherForecast (date, temp, description, icon)

          **3. Category System** for Pacific/Hawaii:
          - Beaches, Hiking Trails, Historical Sites, Restaurants
          - Water Activities (snorkeling, surfing, kayaking)
          - Cultural Sites (heiau, museums)
          - Scenic Viewpoints, Waterfalls
          - Shopping (local markets, malls)

          **4. Curated Attraction Database** (Hawaii):
          Write a JSON seed file with 20 real Hawaii attractions including:
          - Diamond Head, Waimea Canyon, Na Pali Coast
          - Haleakala, Road to Hana, Pololu Valley
          - Waikiki Beach, North Shore, Lanikai Beach
          Include lat/lon, category, description, best_time_to_visit

          **5. Geocoding Integration**:
          Use Nominatim (free, no API key) for address → coordinates.

          Save all files using the file tools.
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: apply_text_edits
                - name: describe_available_files
                - name: geocode_location
                - name: get_weather
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: Itinerary AI Engine
      type: agent
      description: 'Builds the AI-powered itinerary generation system'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are an AI Travel Planner Engineer. Build the itinerary generation system.

          **Itinerary Generator Service**:
          Create a backend endpoint `POST /api/itinerary/generate` that accepts:
          ```json
          {
            "destination": "Maui, Hawaii",
            "days": 5,
            "travel_style": "adventure|relaxation|culture|family",
            "budget": "budget|mid-range|luxury",
            "group_size": 2,
            "interests": ["hiking", "snorkeling", "food"]
          }
          ```

          The service should:
          1. Use an LLM (via the project's API_KEY) to generate a day-by-day itinerary
          2. Include specific attraction recommendations (use the curated DB)
          3. Add estimated timing (how long to spend at each place)
          4. Include meal recommendations for breakfast, lunch, dinner
          5. Calculate estimated daily budget
          6. Add travel tips (best time to go, parking, reservations needed)

          **Itinerary Output Format**:
          ```json
          {
            "title": "5-Day Maui Adventure",
            "summary": "...",
            "days": [
              {
                "day": 1,
                "theme": "Road to Hana",
                "morning": { "activity": "...", "location": {...}, "duration_hours": 3 },
                "afternoon": { ... },
                "evening": { ... },
                "meals": { "breakfast": "...", "lunch": "...", "dinner": "..." },
                "tips": ["...", "..."],
                "estimated_cost_usd": 120
              }
            ],
            "total_estimated_cost_usd": 600,
            "packing_list": ["..."],
            "emergency_contacts": ["..."]
          }
          ```

          Also create a `GET /api/itinerary/sample` endpoint with a pre-generated sample.
          Save all files using the file tools.
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: apply_text_edits
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

    - id: Tourism App Frontend Developer
      type: agent
      description: 'Builds the tourism app UI with maps and itinerary display'
      context_window: -1
      config:
        name: gpt-4o
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |-
          You are a Frontend Developer specializing in travel apps and mobile-first design.
          You have the complete backend from the Location Data Integrator and Itinerary AI Engine.

          Build a beautiful, mobile-first tourism app frontend using React (or Vue 3):

          **Pages**:
          1. **Home/Discover**: Featured destinations, weather widget, search bar
          2. **Explore Map**: Interactive map with attraction pins, category filters, click to view details
          3. **Plan Itinerary**: Form to set trip parameters → AI-generated day-by-day itinerary
          4. **Attraction Detail**: Photos, description, weather, nearby places, "Add to Itinerary" button
          5. **My Trips**: Saved itineraries

          **Design Guidelines**:
          - Ocean/tropical color palette (teal, coral, warm sand)
          - Card-based attraction displays with hero images
          - Bottom navigation bar for mobile
          - Smooth transitions and skeleton loaders
          - Weather widget showing current conditions

          **Components**:
          - `<AttractionCard>` with image, name, category badge, rating stars
          - `<WeatherWidget>` showing temp, condition icon, forecast
          - `<ItineraryDay>` collapsible day plan
          - `<MapView>` using Leaflet.js (free, no API key)
          - `<SearchBar>` with category filter chips

          Write complete, working code. Save all files using the file tools.
        params: {}
        tooling:
          - type: function
            config:
              tools:
                - name: save_file
                - name: read_file_segment
                - name: create_folder
                - name: list_directory
                - name: apply_text_edits
                - name: describe_available_files
              timeout:
        thinking: null
        memories: []
        retry: null

  edges:
    - from: USER
      to: Travel Product Manager
      condition:
        type: always
        config: {}
    - from: Travel Product Manager
      to: Location Data Integrator
      condition:
        type: always
        config: {}
    - from: Location Data Integrator
      to: Itinerary AI Engine
      condition:
        type: always
        config: {}
    - from: Itinerary AI Engine
      to: Tourism App Frontend Developer
      condition:
        type: always
        config: {}
    - from: Tourism App Frontend Developer
      to: FINAL
      condition:
        type: always
        config: {}

  start:
    - USER
